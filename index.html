<title>Happy Birthday Thirah 🤍</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* 🌈 BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:linear-gradient(-45deg,#0f172a,#1e293b,#7c3aed,#ff4d6d);
background-size:400% 400%;
animation:bg 12s ease infinite;
filter:blur(18px);
z-index:-1;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:800px;
margin:auto;
padding:30px;
