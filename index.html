<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Thirah 🤍</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* 🌈 BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:linear-gradient(-45deg,#0f172a,#1e293b,#7c3aed,#ff4d6d);
background-size:400% 400%;
animation:bg 12s ease infinite;
filter:blur(18px);
z-index:-1;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 🧁 CONTAINER */
.container{
max-width:800px;
margin:auto;
padding:30px;
text-align:center;
}

/* 🎂 TITLE */
h1{
font-size:38px;
text-shadow:0 0 10px #ff4d6d;
}

/* ✨ BUTTON */
button{
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4d6d,#ff9a9e);
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* 💌 BOX */
.box{
display:none;
margin-top:30px;
padding:20px;
background:rgba(0,0,0,0.45);
border-radius:15px;
backdrop-filter:blur(8px);
}

/* 🖼️ IMAGE SLIDE */
.img-slide{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
}

.img-slide img{
width:160px;
height:160px;

/* 🔥 IMPORTANT PART (FACE CENTER FIX) */
object-fit:cover;
object-position:center center;

border-radius:22px;
border:2px solid rgba(255,255,255,0.5);
box-shadow:0 0 20px rgba(255,255,255,0.25);

/* smooth fade */
transition:0.8s ease;
opacity:1;
}

/* ✍️ TEXT */
#text{
white-space:pre-line;
line-height:1.8;
font-size:16px;
text-align:left;
margin-top:10px;
}

/* 💖 FINAL */
#final{
display:none;
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
<source src="countonme.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>Happy Birthday Thirah 🎂</h1>

<button onclick="start()">Open Message 🤍</button>

<div class="box" id="box">

<!-- 🖼️ SLIDE IMAGE -->
<div class="img-slide">
<img id="slideImage" src="img1.jpg">
</div>

<!-- ✍️ TEXT -->
<div id="text"></div>

<!-- 💌 FINAL -->
<div id="final">
🤍 Happy Birthday Bestie 🤍
</div>

</div>

</div>

<script>

const text = `
Happy Birthday Thirahhhh 🫶🏻

Semoga panjang umur dan dimurahkan rezeki 🥰

Kau dah tua dah sekarang ehhh 🤣 HAHAHA gurau je

Terima kasih sebab masih ada dalam dunia ni walaupun banyak benda yang kau hadap, and I know it’s not easy sometimes 🥺

Tapi kau kena ingat, kau tak keseorangan 🫶🏻 I still ada kalau kau perlukan someone to talk to

Thank you sebab sudi jadi kawan I walaupun I banyak karenah dan kadang-kadang menyusahkan 😭 tapi kau still stay 🥹 I really appreciate that

I hope kau dapat jodoh yang baik, yang boleh jaga kau dan layan perangai kau macam mana I layan kau (tapi versi lebih sabar 😂)

And I hope kita boleh jadi kawan sampai bila-bila 🫶🏻

Take care of yourself always okay 🤍
`;

let images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg"];
let index = 0;

function startSlideshow(){
setInterval(()=>{
let img = document.getElementById("slideImage");

/* fade effect */
img.style.opacity = 0;

setTimeout(()=>{
img.src = images[index];
img.style.opacity = 1;
index = (index + 1) % images.length;
},300);

},2500);
}

function start(){

document.getElementById("box").style.display="block";

startSlideshow();

// 🎵 music
let audio = document.getElementById("music");
audio.volume = 0;
audio.play().catch(()=>{});

let v = 0;
let fade = setInterval(()=>{
if(v < 1){
v += 0.05;
audio.volume = v;
}else{
clearInterval(fade);
}
},200);

// ✍️ typing text
let i = 0;
let box = document.getElementById("text");

function type(){
if(i < text.length){
box.innerHTML += text.charAt(i);
i++;
setTimeout(type, 25);
}else{
document.getElementById("final").style.display="block";
}
}

type();

}

</script>

</body>
</html>
