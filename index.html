<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Thirah 🤍</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f172a,#1e293b,#7c3aed,#ff4d6d);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:700px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,0.15);
}

h1{
margin-bottom:20px;
font-size:34px;
}

/* GIFT */
#gift{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
margin-bottom:20px;
}

.box-gift{
font-size:70px;
animation:float 1.5s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

#gift p{
margin-top:10px;
opacity:0.8;
}

/* BUTTON */
button{
padding:15px 35px;
border:none;
border-radius:50px;
background:#ff4d6d;
color:white;
font-size:17px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#content{
display:none;
margin-top:20px;
}

.image-box{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.image-box img{
width:220px;
height:280px;
object-fit:cover;
border-radius:20px;
border:3px solid rgba(255,255,255,0.4);
box-shadow:0 0 20px rgba(255,255,255,0.2);
transition:0.6s;
}

#text{
white-space:pre-line;
text-align:left;
line-height:1.8;
margin-top:10px;
font-size:16px;
}

#final{
display:none;
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="countonme.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>Happy Birthday Thirah 🎂</h1>

<div id="gift">
  <div class="box-gift">🎁</div>
  <p>Tap the gift to open</p>
</div>

<button id="openBtn">Open Message 🤍</button>

<div id="content">

<div class="image-box">
<img id="slideImage" src="img1.jpg">
</div>

<div id="text"></div>

<div id="final">🤍 Happy Birthday Bestie 🤍</div>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

const message = `
Happy Birthday Thirahhhh 🥳🥳

Semoga panjang umur dan dimurahkan rezeki 🥰

HAHAHAHAHA kau dah tua dah sekarang ehhh 🤣 HAHAHA aku gurau je tauu 🤣🤣

Terima kasih sebab masih bertahan untuk hidup walaupun banyak benda yang kau hadap 🥺🥺

Tapi kau kena ingat, kau tak keseorangan 🫶🏻 Kau masih ada family kau & aku pun akan still ada dengan kau kalau kau perlukan aku 🥰

Thank you sebab sudi jadi kawan aku 🫶🏻🥹

Aku harap kau dapat jodoh yang baik bestie 🥹🥹

And I hope kita jadi kawan sampai bila-bila 🫶🏻🥹

Take care always 🤍
`;

const images = [
  "img1.jpg",
  "img2.jpg",
  "img3.jpg",
  "img4.jpg",
  "img5.jpg"
];

let index = 0;

const gift = document.getElementById("gift");
const btn = document.getElementById("openBtn");
const content = document.getElementById("content");
const textBox = document.getElementById("text");
const finalBox = document.getElementById("final");
const img = document.getElementById("slideImage");
const audio = document.getElementById("music");

function startAll(){

gift.style.display="none";
btn.style.display="none";
content.style.display="block";

/* music */
audio.volume = 0;
audio.play().catch(()=>{});

let v = 0;
let fade = setInterval(()=>{
v += 0.05;
audio.volume = v;
if(v >= 1) clearInterval(fade);
},200);

startSlideshow();
typeText();

}

/* EVENTS SAFE */
gift.addEventListener("click", startAll);
btn.addEventListener("click", startAll);

/* SLIDESHOW */
function showImage(){
img.style.opacity = 0;

setTimeout(()=>{
img.src = images[index];
img.style.opacity = 1;

index = (index + 1) % images.length;
},300);
}

function startSlideshow(){
showImage();
setInterval(showImage,2500);
}

/* TYPE EFFECT */
function typeText(){
let i = 0;

function typing(){
if(i < message.length){
textBox.textContent += message.charAt(i);
i++;
setTimeout(typing,25);
}else{
finalBox.style.display="block";
}
}

typing();
}

});

</script>

</body>
</html>
